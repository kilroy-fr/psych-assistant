services:
  psych-assistant:
    build: .
    container_name: psych-assistant
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5005:5000"  # Direkter Zugriff für Entwicklung
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TZ=Europe/Berlin
    networks:
      - ollama-net
      - caddy-proxy-network
    volumes:
      - ./data:/app/data/data
      - ./storage:/app/storage
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  ollama-net:
    external: true
  caddy-proxy-network:
    external: true
    name: caddy-proxy-network
